<!DOCTYPE html>
<html lang="en">
<head>
    <title>for each loop</title>
</head>
<body>
    
    <script>
        let arr=[3,4,7,8,9];
        console.log('Nrml method');
        for (let i=0;i<arr.length;i++){
            console.log(arr[i]);
        }
        console.log('Using for each loop');
        arr.forEach(function(num){
            console.log(num);
        })
    </script>
</body>
</html>
