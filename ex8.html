<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    

    <script>
        function sum(a,b){
            return a+b;
        }
        console.log(sum(2,3));
        console.log(sum(1.1,2.8));

        function greet(name)
        {
            return `Namasthe ${name}.`;
        }
        console.log(greet('vikhilesh'));
        //default value set
        function greet(name='Ram')
        {
            return `Namasthe ${name}.`;
        }
        console.log(greet());
        console.log(greet('krishna'));
    </script>
</body>
</html>
