<!DOCTYPE html>
<html lang="en">
<head>
    <title>Object</title>
</head>
<body>
    
    <script>
        let product={
            company:'Mango',
            price:200,
            item_name:'T-shirt',
        };
        console.log(product);
        console.log(typeof(product));
        console.log(product.company);
        console.log(product.price);
        console.log(product.item_name);
        product.company='Apple';
        console.log(product);

        //Another way of accesing a object
        console.log(product['company']);

        //delete from an object
        delete product.price;
        console.log(product);

    </script>
</body>
</html>
