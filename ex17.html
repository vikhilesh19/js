<!DOCTYPE html>
<html lang="en">
<head>
    <title>Arrays</title>
</head>
<body>
    <script>

        //array declaration
        let numbers=[1,4,3,7,5,2,6,9,0];
        console.log(numbers);
        console.log(numbers[3]);
        console.log(typeof(numbers));//considered as an object
        //Array can different data types
        let array=[1,true,null,'hai',{likes:'2M'}];
        console.log(array);
        console.log(typeof(array));
        console.log(typeof(array[0]));
        console.log(typeof(array[1]));
        console.log(typeof(array[2]));
        console.log(typeof(array[3]));
        console.log(typeof(array[4]));

        //as typeof gives both array and object as object to check if it is array or not
        console.log(Array.isArray(numbers));
        console.log(Array.isArray(array));

        let obj={
            obj1:'hai',
            obj2:'hello',
        };
        console.log(Array.isArray(obj));

        let arr=[1,2,3];
        console.log(arr);
        arr.push(6);//add element at the end of arr
        console.log(arr);
        arr.pop();//remove last element (6 is popped)
        arr.pop();//3 is also popped
        console.log(arr);

        let a=[3,5,7,6,0,1,2];
        console.log(a);
        a.splice(1,3);//removes elements of index from 1 to 3
        console.log(a);

        //covert array to string
        console.log(numbers.toString());
        //to sort an array
        numbers.sort();
        console.log(numbers);

        //array are same as object they work based on references

        let arr2=arr;
        console.log(arr);
        console.log(arr2);
        arr2[0]=3;//this will change both in 
        console.log(arr);
        console.log(arr2);
        
        //destructuring
        let new_arr=[9,8,7,6];
        let [p,q,r,s]=new_arr;
        console.log(p+' '+q+' '+r+' '+s);
        

    </script>
</body>
</html>
