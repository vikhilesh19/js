<!DOCTYPE html>
<html lang="en">
<head>
    <title>Date</title>
</head>
<body>
    <h1>Creation of date object</h1>
    <script>
        let mydate=new Date();

        //gives complete data and time
        console.log(mydate);

        //give time(no of milliseconds since jan 1970)
        console.log(mydate.getTime());

        //give present year
        console.log(mydate.getFullYear());

        //gives present day
        console.log(mydate.getDay());

        //gives hours
        console.log(mydate.getHours());

        //gives minitues
        console.log(mydate.getMinutes());

        //give milliseconds
        console.log(mydate.getMilliseconds());
    </script>
</body>
</html>
