<!DOCTYPE html>
<html lang="en">
<head>
    <title>Loop</title>
</head>
<body>
    
    <script>

        //while loop
        console.log('While loop')
        let num=1;
        while(num<=10){
            console.log(num);
            num++;
        }

        //Do-while loop
        console.log('Do-While loop')
        let a=0;
        do{
            console.log(a);
            a++;
        }while(a<5);

        //For loop
        console.log('For loop')
        for (let b=0;b<=5;b++){
            console.log(b);
        }
    </script>
</body>
</html>
