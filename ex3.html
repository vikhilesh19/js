<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntrs Bag</title>
    <link rel="stylesheet" href="ex3.css">
</head>
<body>

    <button class="button" id="button1" onclick="cart_quantity++;document.querySelector('#cartsummary').innerText=`Your bag has  ${cart_quantity} items`;">Add to Bag</button>
    <button class="button" id="button2" onclick="cart_quantity--;document.querySelector('#cartsummary').innerText=`Your bag has  ${cart_quantity} items`;" >Move to Wishlist</button>
    <button class="button" id="button3" onclick="cart_quantity+=2;document.querySelector('#cartsummary').innerText=`Your bag has  ${cart_quantity} items`;" >Add 1+1 Sale item</button>

    <h1 id="cartsummary">Your Bag has 0 items</h1>

    <script src="ex3.js"></script>

</body>
</html>
