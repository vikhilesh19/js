<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    
    <script>
        let alarm=function(){
            console.log('Alaram activated');
        }
        setTimeout(alarm,5000); //calls the alarm function after 5000 milliseconds
        console.log('Alarm set');
        function hai()
        {
            console.log('Hai');
        }
        setTimeout(hai,2000);//calls hai functions after 2000 milliseconds
        setInterval(alarm,1000);//calls alarm function for every 1000 milliseconds
    </script>
</body>
</html>
