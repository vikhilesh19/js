<!DOCTYPE html>
<html lang="en">
<head>
    <title>Functions</title>
</head>
<body>
    

    <script>
        let age;
        function printage(){
            console.log('Your age is : '+age);
        }

        age=20;
        printage();
        age=19;
        printage();
        
        while(age){
            age--;
            printage();
        }
    </script>
</body>
</html>
